<root style="max-width: 100%; min-width: 0; width: 100%; display: block">
  <div style="display: flex; flex-wrap: wrap; align-items: flex-start; gap: 1rem; width: 100%">
    <div style="flex: 0 0 9rem; min-width: 7rem; max-width: 10rem">
      <poster
        style="display: block; border-radius: 0.85rem; aspect-ratio: 1 / 1; overflow: hidden"
      ></poster>
    </div>

    <div style="flex: 1 1 16rem; min-width: 0">
      <show-title
        style="display: block; font-size: 0.875rem; line-height: 1.2; opacity: 0.85"
      ></show-title>
      <episode-title
        style="
          display: block;
          font-size: 1rem;
          font-weight: 700;
          line-height: 1.1;
          margin-top: 0.35rem;
        "
      ></episode-title>
      <divider
        style="
          display: block;
          width: 100%;
          height: 1px;
          margin: 0.55rem 0 0.9rem;
          background-image: none;
          background-color: hsl(0 0% 100% / 0.1);
        "
      ></divider>

      <div
        style="
          display: grid;
          grid-template-columns: minmax(0, 1fr) auto auto auto minmax(0, 1fr);
          align-items: center;
          column-gap: 0.8rem;
          width: 100%;
        "
      >
        <speed-control style="justify-self: start"></speed-control>
        <step-backward style="justify-self: center"></step-backward>
        <play-button variant="simple" colorType="brand" style="justify-self: center"></play-button>
        <step-forward style="justify-self: center"></step-forward>
        <volume-control style="justify-self: end"></volume-control>
      </div>

      <div style="display: block; width: 100%">
        <progress-bar
          style="display: block; margin: 0.3rem 0 0; height: 20px; min-height: 0"
        ></progress-bar>
      </div>

      <div
        style="
          display: grid;
          grid-template-columns: minmax(0, auto) minmax(0, 1fr) minmax(0, auto);
          align-items: center;
          column-gap: 0.75rem;
          width: 100%;
        "
      >
        <timer-current style="font-size: 0.88rem"></timer-current>
        <chapter-current
          style="font-size: 0.88rem; text-align: center; overflow: hidden"
        ></chapter-current>
        <timer-duration style="display: none"></timer-duration>
      </div>
    </div>
  </div>
  <error></error>
</root>
