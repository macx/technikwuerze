title: Site

tabs:
  dashboard:
    label:
      en: Dashboard
      de: Dashboard
    icon: dashboard
    columns:
      - width: 2/3
        sections:
          pages:
            type: pages
            query: site.find("mediathek").index.filterBy("intendedTemplate", "episode").sortBy("date", "desc").limit(12)
            label:
              en: Latest Episodes
              de: Letzte Folgen
            layout: list
            image:
              query: page.podcasterCover.tofile
              back: var(--menu-color-back)
            info: "{{ page.date.toDate('d.m.Y H:i') }}"

      - width: 1/3
        sections:
          draft:
            type: pages
            label:
              en: Drafts
              de: Entwürfe
            status: drafts
            templates:
              - page
              - season
              - episode
              - participant
              - testimonials
              - podcasterfeed
              - covers
            image:
              query: page.cover.tofile
              cover: true
          listed:
            label:
              en: Pages
              de: Seiten
            type: pages
            templates:
              - home
              - mediathek
              - teilnehmende
            status: listed
            layout: list
            info: '{{ page.children.count }} Seiten'
            columns:
              subpages:
                label: Seiten
                align: center
                width: 1/6
            image:
              query: page.cover.tofile
              cover: true
          unlisted:
            type: pages
            label:
              en: Not listed
              de: Nicht gelistet
            layout: list
            status: unlisted
            image:
              query: page.cover.tofile
              cover: true

  settings:
    label:
      en: Settings
      de: Einstellungen
    icon: cog
    columns:
      - width: 1/3
        fields:
          generalHeadline:
            label:
              en: General
              de: Allgemein
            type: headline
          description:
            label:
              en: Description
              de: Kurzbeschreibung
            type: textarea
            size: medium
            minlength: 50
            maxlength: 190
            buttons: false
          tags:
            label: Tags
            type: tags

      - width: 1/3
        fields:
          footerHeadline:
            label:
              en: Footer
              de: Footer
            type: headline
          footerSponsorsHint:
            label:
              en: Sponsor notice
              de: Sponsoren-Hinweis
            type: text
          footerAboutUs:
            label:
              en: About us
              de: Wir über uns
            type: textarea
            size: small
          footerContactLabel:
            label:
              en: Handwriting
              de: Handschriflich
            type: text
            size: small
          footerContactHint:
            label:
              en: Contact note
              de: Kontakt-Hinweis
            type: textarea
            size: small

      - width: 1/3
        fields:
          socialHeadline:
            label:
              en: Social media
              de: Social Media
            type: headline
          socialLinks:
            label:
              en: Social links
              de: Social Links
            type: structure
            sortable: true
            fields:
              network:
                label:
                  en: Network
                  de: Netzwerk
                type: select
                options:
                  bluesky: Bluesky
                  mastodon: Mastodon
                  threads: Threads
                  instagram: Instagram
                  tiktok: TikTok
                  youtube: YouTube
                  discord: Discord
                  linkedin: LinkedIn
                  twitch: Twitch
                  x: X
                required: true
              url:
                label: URL
                type: url
                required: true
            columns:
              network:
                width: 1/3
              url:
                width: 2/3
            default:
              - network: bluesky
                url: https://bsky.app/
              - network: mastodon
                url: https://mastodon.social/
              - network: threads
                url: https://www.threads.net/
              - network: instagram
                url: https://www.instagram.com/
              - network: tiktok
                url: https://www.tiktok.com/
              - network: youtube
                url: https://www.youtube.com/
              - network: discord
                url: https://discord.com/
              - network: linkedin
                url: https://www.linkedin.com/
              - network: twitch
                url: https://www.twitch.tv/
              - network: x
                url: https://x.com/

  email:
    label:
      en: Form
      de: Formular
    icon: email
    columns:
      - width: 1/2
        fields:
          recipient:
            label:
              en: Recipient
              de: Empfänger
            type: email
            icon: email
            width: 1/2
          sender:
            label:
              en: Sender
              de: Absender
            type: email
            icon: email
            width: 1/2
          subject:
            label:
              en: Subject Contact
              de: Betreff Kontakt
            type: text
            help:
              en: Use variables like {{email}}
              de: Variablen wie {{email}} sind erlaubt
          messageSentText:
            label:
              en: Message sent text
              de: Nachricht gesendet Text
            type: textarea
            size: medium
