title: Season

columns:
  - width: 2/3
    sections:
      episodes:
        type: pages
        label: Folgen
        info: '{{ page.podcasterSubtitle }}<br />{{ page.date.toDate("d.m.Y") }}'
        templates:
          - episode
        sortBy: date desc
        layout: list

  - width: 1/3
    sections:
      content:
        type: fields
        fields:
          text:
            extends: fields/content-blocks
            label: Beschreibung
