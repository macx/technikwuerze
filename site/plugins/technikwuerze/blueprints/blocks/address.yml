name: Adresse
icon: map
fields:
  addresstype:
    label: Adress-Typ
    type: radio
    default: normal
    options:
      normal: Normale Adresse
      packstation: Packstation
  name:
    label: Name
    type: text
  company:
    label: Firma
    type: text
    when:
      addresstype: normal
  street:
    label: Straße und Hausnummer
    type: text
    when:
      addresstype: normal
  postnummer:
    label: Postnummer
    type: text
    when:
      addresstype: packstation
  packstation:
    label: Packstation (Nummer)
    type: text
    when:
      addresstype: packstation
  zip:
    label: PLZ
    type: text
    width: 1/4
  city:
    label: Ort
    type: text
    width: 3/4
  country:
    label: Land
    type: text
    default: GERMANY
    when:
      addresstype: normal
